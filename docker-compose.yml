version: "3.9"

networks:
  restaurant-net:
    driver: bridge

services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - ORDER_SERVICE_URL=http://order-service:8001
      - MENU_SERVICE_URL=http://menu-service:8002
      - BILLING_SERVICE_URL=http://billing-service:8003
      - TABLE_SERVICE_URL=http://table-service:8004
      - STORE_SERVICE_URL=http://store-service:8005
      - DELIVERY_SERVICE_URL=http://delivery-service:8006
      - JWT_SECRET=replace-with-a-strong-random-secret
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=60
    depends_on:
      order-service:
        condition: service_healthy
      menu-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
      table-service:
        condition: service_healthy
      store-service:
        condition: service_healthy
      delivery-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').getcode()==200 else 1)" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - restaurant-net

  order-service:
    build: ./order-service
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=order-service
      - SERVICE_PORT=8001
      - MONGODB_URL=${MONGODB_URL}
      - MONGO_DB_NAME=restaurant
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').getcode()==200 else 1)" ]
